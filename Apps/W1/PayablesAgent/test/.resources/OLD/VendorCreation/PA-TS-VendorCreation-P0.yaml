tests:
- name: PayablesAgent-VendorCreation-001
  description: Process an invoice PDF for an unknown vendor, where customer asks the agent to create said vendor and continue.
  test_setup: PA-P0.yaml
  invoice_setup: PA-INV-UnknownVendor.yaml
  invoice_no: INV-001
  expected_data:
    userIntervention: true
    userInterventionReason: Vendor not found
    userInterventionContinue: true
    userInterventionSuggestion: true
    purchaseHeader:
      invoiceNumber: INV-001

