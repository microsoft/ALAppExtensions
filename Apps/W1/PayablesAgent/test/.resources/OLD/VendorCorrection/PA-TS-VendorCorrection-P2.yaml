tests:
- name: PayablesAgent-VendorCorrection-101
  description: Process an invoice PDF for an unknown vendor, where customer selects an existing vendor and continue.
  test_setup: PA-P0.yaml
  invoice_setup: PA-INV-UnknownVendor.yaml
  invoice_no: INV-003
  expected_data:
    userIntervention: true
    userInterventionReason: Vendor not found
    userInterventionContinue: true
    userInterventionSelection:
      vendorName: AgriNova Foods
    purchaseHeader:
      invoiceNumber: INV-003

