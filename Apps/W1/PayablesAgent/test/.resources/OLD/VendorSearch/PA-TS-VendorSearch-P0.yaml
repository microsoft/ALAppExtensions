tests:
  # --- Exact match ---
  - name: SEARCH_VENDOR_01
    description: Exact search using full vendor name and address.
    test_setup: PA-VendorSearch.yaml
    
    vendor_name: "Atlantics Supply LLC"
    vendor_address: "1201 Ocean Drive, Miami, 33139, US"

    expected_data:
      vendor:
        accountNo: 10091
      purchaseHeader:
        invoiceNumber: "INV-001"

  # --- Mild typo in vendor name ---
  - name: SEARCH_VENDOR_02
    description: Vendor name has a small OCR typo (missing letter).
    test_setup: PA-VendorSearch.yaml
    
    vendor_name: "Atlanlc Supplies Inc"   # OCR dropped the "i" in Atlantic
    vendor_address: "1200 Ocean Drive, Miami, 33139, US"

    expected_data:
      vendor:
        accountNo: 10090
      purchaseHeader:
        invoiceNumber: "INV-001"

