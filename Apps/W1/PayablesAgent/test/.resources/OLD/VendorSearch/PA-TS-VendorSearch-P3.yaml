tests:

  - name: SEARCH_VENDOR_130
    description: Postal code completely wrong but everything else correct.
    test_setup: PA-VendorSearch.yaml
    
    vendor_name: "Rapid Courier Services"
    vendor_address: "50 Delivery Street, Los Angeles, 12345, US"

    expected_data:
      vendor:
        accountNo: 10032  # Should still match based on other components
      purchaseHeader:
        invoiceNumber: "INV-001"

