tests:

  # --- Ambiguous cases - Similar vendor names/addresses that might cause wrong vendor selection ---
  - name: SEARCH_VENDOR_AMBIGUOUS_01
    description: Ambiguous name matching both Great Plains Manufacturing and Great Planes Mfg, wrong address provided.
    test_setup: PA-VendorSearch.yaml
    
    vendor_name: "Great Planes Manufacturing"
    vendor_address: "4555 Pioneer Road, Omaha, 68104, US"

    expected_data:
      vendor:
        accountNo: 10002  # Should match 10002, not 10003
      purchaseHeader:
        invoiceNumber: "INV-001"

  - name: SEARCH_VENDOR_AMBIGUOUS_02
