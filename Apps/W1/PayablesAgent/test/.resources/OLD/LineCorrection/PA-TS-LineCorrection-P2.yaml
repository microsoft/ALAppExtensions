tests:
- name: PayablesAgent-LineCorrection-101
  description: Process an invoice PDF where one or more lines couldn't be match, where customer selects an existing account and continue.
  test_setup: PA-P0.yaml
  invoice_setup: PA-INV-LineCorrection.yaml
  invoice_no: INV-001
  expected_data:
    userIntervention: true
    userInterventionReason: Account number not found
    userInterventionContinue: true
    userInterventionSelection:
      accountNumber: GLTEST1234
    purchaseHeader:
      invoiceNumber: INV-001

