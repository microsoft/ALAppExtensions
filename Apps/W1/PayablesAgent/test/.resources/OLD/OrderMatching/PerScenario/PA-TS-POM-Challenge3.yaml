# # Scenario Challenge3

# **Description**: All invoice lines (up to 3) match across multiple open purchase orders (up to 3 orders with up to 3 lines each) for the same vendor.
# **Purpose**: Tests the agent's ability to match lines when distributed across multiple purchase orders.

#  ## GIVEN
#  - An invoice with maximum 3 lines 
#  - A maximum of 3 open purchase orders exist for the vendor.
#  - Each order has maximum 3 lines.
#  - Every line on the invoice matches a line on one of the purchase orders.
#  ## WHEN
#  The agent processes the invoice.
#  ## THEN
#  All the invoice's lines match the open purchase order lines.

tests:
- name: Challenge3_001
  test_setup: PA-OrderMatch.yaml
  purchaseOrdersToCreate:
    - lines:
        - description: Office Desk Standard
          quantity: 5
          unitPrice: 250.00
        - description: Ergonomic Office Chair
          quantity: 5
          unitPrice: 180.00
    - lines:
        - description: LED Monitor 24 inch
          quantity: 10
          unitPrice: 220.00
        - description: Wireless Keyboard
          quantity: 8
          unitPrice: 45.00
  invoice:
    invoice_no: INV-001
    invoice_date: 15/11/2025
    template: invoice_basic.html
    vendor_name: "Strauss Medium"
    items:
    - description: Standard Office Desk
      quantity: 5
      unit_price: 250.00
      discount: 0.00
      tax_rate: 10
    - description: 24" LED Monitor
      quantity: 10
      unit_price: 220.00
      discount: 0.00
      tax_rate: 10
    - description: Ergonomic Chair for Office
      quantity: 5
      unit_price: 180.00
      discount: 0.00
      tax_rate: 10
  expected_data:
    orderLineMatches:
      - purchaseOrderIndex: 1
        purchaseOrderLineIndex: 1 # Office Desk Standard
        invoiceLineIndex: 1 # Standard Office Desk
      - purchaseOrderIndex: 2
        purchaseOrderLineIndex: 1 # LED Monitor 24 inch
        invoiceLineIndex: 2 # 24" LED Monitor
      - purchaseOrderIndex: 1
        purchaseOrderLineIndex: 2 # Ergonomic Office Chair
        invoiceLineIndex: 3 # Ergonomic Chair for Office

