# # Scenario OneLine3

# **Description**: Only one invoice line (out of up to 3) matches one of the open purchase orders (up to 2 orders with up to 3 lines each) for the same vendor.
# **Purpose**: Tests the agent's ability to identify partial matches when only a single line corresponds to purchase orders.

#  ## GIVEN
#  - An invoice with maximum 3 lines 
#  - A maximum of 2 open purchase orders exist for the vendor.
#  - Each order has maximum 3 lines.
#  - Only one line on the invoice matches a line on one of the purchase orders.
#  ## WHEN
#  The agent processes the invoice.
#  ## THEN
#  A single line should match one of the open purchase order lines.

tests:
- name: OneLine3_001
  test_setup: PA-OrderMatch.yaml
  purchaseOrdersToCreate:
    - lines:
        - description: Office Desk Standard
          quantity: 5
          unitPrice: 250.00
        - description: Ergonomic Office Chair
          quantity: 5
          unitPrice: 180.00
        - description: LED Monitor 24 inch
          quantity: 10
          unitPrice: 220.00
    - lines:
        - description: Laptop Dell XPS
          quantity: 3
          unitPrice: 1500.00
        - description: Wireless Keyboard
          quantity: 8
          unitPrice: 45.00
  invoice:
    invoice_no: INV-001
    invoice_date: 15/11/2025
    template: invoice_basic.html
    vendor_name: "Strauss Medium"
    items:
    - description: 24 inch LED Monitor
      quantity: 10
      unit_price: 220.00
      discount: 0.00
      tax_rate: 10
    - description: Industrial Shelving Unit
      quantity: 4
      unit_price: 280.00
      discount: 0.00
      tax_rate: 10
    - description: Safety Goggles Pack
      quantity: 50
      unit_price: 8.50
      discount: 0.00
      tax_rate: 10
  expected_data:
    orderLineMatches:
      - purchaseOrderIndex: 1
        purchaseOrderLineIndex: 3 # LED Monitor 24 inch
        invoiceLineIndex: 1 # 24 inch LED Monitor

