# # Scenario AllLines5

# **Description**: All invoice lines (up to 5) match a single open purchase order (up to 5 lines) for the same vendor.
# **Purpose**: Medium complexity scenario to test matching reliability with moderate number of lines.

#  ## GIVEN
#  - An invoice with maximum 5 lines 
#  - A maximum of 1 open purchase order exists for the vendor.
#  - Each order has maximum 5 lines.
#  - Every line on the invoice matches a line on the purchase order.
#  ## WHEN
#  The agent processes the invoice.
#  ## THEN
#  All the invoice's lines match the open purchase order lines.

tests:
- name: AllLines5_001
  test_setup: PA-OrderMatch.yaml
  purchaseOrdersToCreate:
    - lines:
        - description: Office Desk Executive
          quantity: 8
          unitPrice: 450.00
        - description: Ergonomic Office Chair Premium
          quantity: 8
          unitPrice: 320.00
        - description: LED Monitor 27 inch
          quantity: 12
          unitPrice: 380.00
        - description: Wireless Keyboard and Mouse Set
          quantity: 15
          unitPrice: 65.00
        - description: Desk Lamp LED Adjustable
          quantity: 10
          unitPrice: 42.50
  invoice:
    invoice_no: INV-001
    invoice_date: 15/11/2025
    template: invoice_basic.html
    vendor_name: "Strauss Medium"
    items:
    - description: Office Desk Executive
      quantity: 8
      unit_price: 450.00
      discount: 0.00
      tax_rate: 10
    - description: Premium Ergonomic Chair for Office
      quantity: 8
      unit_price: 320.00
      discount: 0.00
      tax_rate: 10
    - description: LED Monitor 27 inch
      quantity: 12
      unit_price: 380.00
      discount: 0.00
      tax_rate: 10
    - description: Wireless Keyboard and Mouse Set
      quantity: 15
      unit_price: 65.00
      discount: 0.00
      tax_rate: 10
    - description: Adjustable LED Desk Lamp
      quantity: 10
      unit_price: 42.50
      discount: 0.00
      tax_rate: 10
  expected_data:
    orderLineMatches:
      - purchaseOrderIndex: 1
        purchaseOrderLineIndex: 1 # Office Desk Executive
        invoiceLineIndex: 1 # Office Desk Executive
      - purchaseOrderIndex: 1
        purchaseOrderLineIndex: 2 # Ergonomic Office Chair Premium
        invoiceLineIndex: 2 # Premium Ergonomic Chair for Office
      - purchaseOrderIndex: 1
        purchaseOrderLineIndex: 3 # LED Monitor 27 inch
        invoiceLineIndex: 3 # LED Monitor 27 inch
      - purchaseOrderIndex: 1
        purchaseOrderLineIndex: 4 # Wireless Keyboard and Mouse Set
        invoiceLineIndex: 4 # Wireless Keyboard and Mouse Set
      - purchaseOrderIndex: 1
        purchaseOrderLineIndex: 5 # Desk Lamp LED Adjustable
        invoiceLineIndex: 5 # Adjustable LED Desk Lamp

