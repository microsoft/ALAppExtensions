# # Scenario AllLines3

# **Description**: All invoice lines (up to 3) match a single open purchase order (up to 3 lines) for the same vendor.
# **Purpose**: Simple scenario, is able to match reliably even if descriptions differ slightly.

#  ## GIVEN
#  - An invoice with maximum 3 lines 
#  - A maximum of 1 open purchase order exists for the vendor.
#  - Each order has maximum 3 lines.
#  - Every line on the invoice matches a line on the purchase order.
#  ## WHEN
#  The agent processes the invoice.
#  ## THEN
#  All the invoice's lines match the open purchase order lines.

tests:
- name: AllLines3_001
  test_setup: PA-OrderMatch.yaml
  purchaseOrdersToCreate:
    - lines:
        - description: Office Desk Standard
          quantity: 5
          unitPrice: 250.00
        - description: Ergonomic Office Chair
          quantity: 5
          unitPrice: 180.00
        - description: LED Monitor 24 inch
          quantity: 10
          unitPrice: 220.00
  invoice:
    invoice_no: INV-001
    invoice_date: 15/11/2025
    template: invoice_basic.html
    vendor_name: "Strauss Medium"
    items:
    - description: Standard Office Desk
      quantity: 5
      unit_price: 250.00
      discount: 0.00
      tax_rate: 10
    - description: Ergonomic Office Chair
      quantity: 5
      unit_price: 180.00
      discount: 0.00
      tax_rate: 10
    - description: 24" LED Monitor
      quantity: 10
      unit_price: 220.00
      discount: 0.00
      tax_rate: 10
  expected_data:
    orderLineMatches:
      - purchaseOrderIndex: 1
        purchaseOrderLineIndex: 1 # Office Desk Standard
        invoiceLineIndex: 1 # Standard Office Desk
      - purchaseOrderIndex: 1
        purchaseOrderLineIndex: 2 # Ergonomic Office Chair
        invoiceLineIndex: 2 # Ergonomic Office Chair
      - purchaseOrderIndex: 1
        purchaseOrderLineIndex: 3 # LED Monitor 24 inch
        invoiceLineIndex: 3 # 24" LED Monitor

