# # Scenario NoLines3

# **Description**: None of the invoice lines (up to 3) match any of the open purchase orders (up to 3 orders with up to 3 lines each) for the same vendor.
# **Purpose**: Tests the agent's ability to correctly identify when no matches exist between invoice and purchase orders.

#  ## GIVEN
#  - An invoice with maximum 3 lines 
#  - A maximum of 3 open purchase orders exist for the vendor.
#  - Each order has maximum 3 lines.
#  - None of the lines on the invoice match any line on the purchase orders.
#  ## WHEN
#  The agent processes the invoice.
#  ## THEN
#  None of the invoice's lines match the open purchase order lines.

tests:
- name: NoLines3_001
  test_setup: PA-OrderMatch.yaml
  purchaseOrdersToCreate:
    - lines:
        - description: Office Desk Standard
          quantity: 5
          unitPrice: 250.00
        - description: Ergonomic Office Chair
          quantity: 5
          unitPrice: 180.00
        - description: LED Monitor 24 inch
          quantity: 10
          unitPrice: 220.00
    - lines:
        - description: Laptop Dell XPS
          quantity: 3
          unitPrice: 1500.00
        - description: Wireless Keyboard
          quantity: 8
          unitPrice: 45.00
    - lines:
        - description: Network Switch 24 Port
          quantity: 2
          unitPrice: 350.00
  invoice:
    invoice_no: INV-001
    invoice_date: 15/11/2025
    template: invoice_basic.html
    vendor_name: "Strauss Medium"
    items:
    - description: Industrial Shelving Unit
      quantity: 4
      unit_price: 280.00
      discount: 0.00
      tax_rate: 10
    - description: Safety Goggles Pack
      quantity: 50
      unit_price: 8.50
      discount: 0.00
      tax_rate: 10
    - description: Forklift Maintenance Service
      quantity: 1
      unit_price: 450.00
      discount: 0.00
      tax_rate: 10
  expected_data:
    noOrderLineMatches: true

