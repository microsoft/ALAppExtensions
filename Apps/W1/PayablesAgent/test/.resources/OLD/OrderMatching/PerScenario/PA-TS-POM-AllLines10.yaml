# # Scenario AllLines10

# **Description**: All invoice lines (up to 10) match a single open purchase order (up to 10 lines) for the same vendor.
# **Purpose**: Extended scenario with more lines to test matching reliability with larger datasets.

#  ## GIVEN
#  - An invoice with maximum 10 lines 
#  - A maximum of 1 open purchase order exists for the vendor.
#  - Each order has maximum 10 lines.
#  - Every line on the invoice matches a line on the purchase order.
#  ## WHEN
#  The agent processes the invoice.
#  ## THEN
#  All the invoice's lines match the open purchase order lines.

tests:
- name: AllLines10_001
