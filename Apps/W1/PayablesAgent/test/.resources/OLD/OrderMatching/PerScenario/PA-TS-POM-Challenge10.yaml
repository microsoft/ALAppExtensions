# # Scenario Challenge10

# **Description**: All invoice lines (up to 10) match across multiple open purchase orders (up to 3 orders with up to 10 lines each) for the same vendor.
# **Purpose**: Complex scenario testing the agent's ability to match lines across multiple orders with larger datasets.

#  ## GIVEN
#  - An invoice with maximum 10 lines 
#  - A maximum of 3 open purchase orders exist for the vendor.
#  - Each order has maximum 10 lines.
#  - Every line on the invoice matches a line on one of the purchase orders.
#  ## WHEN
#  The agent processes the invoice.
#  ## THEN
#  All the invoice's lines match the open purchase order lines.

tests:
