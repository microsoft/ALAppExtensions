# # Scenario Challenge5

# **Description**: All invoice lines (up to 5) match across multiple open purchase orders (up to 3 orders with up to 5 lines each) for the same vendor.
# **Purpose**: Medium complexity scenario testing cross-order matching with moderate number of lines.

#  ## GIVEN
#  - An invoice with maximum 5 lines 
#  - A maximum of 3 open purchase orders exist for the vendor.
#  - Each order has maximum 5 lines.
#  - Every line on the invoice matches a line on one of the purchase orders.
#  ## WHEN
#  The agent processes the invoice.
#  ## THEN
#  All the invoice's lines match the open purchase order lines.

tests:
- name: Challenge5_001
  test_setup: PA-OrderMatch.yaml
  purchaseOrdersToCreate:
    - lines:
        - description: Desktop Computer Dell OptiPlex
          quantity: 8
          unitPrice: 875.00
        - description: Monitor 27 inch 4K
          quantity: 10
          unitPrice: 385.00
        - description: Mechanical Keyboard RGB
          quantity: 12
          unitPrice: 95.00
    - lines:
        - description: Wireless Mouse Ergonomic
          quantity: 15
          unitPrice: 42.50
        - description: Webcam HD 1080p
          quantity: 8
          unitPrice: 68.00
        - description: Headset with Microphone
          quantity: 10
          unitPrice: 55.00
    - lines:
        - description: USB Hub 7 Port
          quantity: 20
          unitPrice: 28.00
        - description: Mouse Pad Large Gaming
          quantity: 15
          unitPrice: 18.50
  invoice:
    invoice_no: INV-001
    invoice_date: 15/11/2025
    template: invoice_basic.html
    vendor_name: "Strauss Medium"
    items:
    - description: Dell OptiPlex Desktop Computer
      quantity: 8
      unit_price: 875.00
      discount: 0.00
      tax_rate: 10
    - description: 27" 4K Monitor
      quantity: 10
      unit_price: 385.00
      discount: 0.00
      tax_rate: 10
    - description: Ergonomic Wireless Mouse
      quantity: 15
      unit_price: 42.50
      discount: 0.00
      tax_rate: 10
    - description: HD 1080p Webcam
      quantity: 8
      unit_price: 68.00
      discount: 0.00
      tax_rate: 10
    - description: USB Hub - 7 Ports
      quantity: 20
      unit_price: 28.00
      discount: 0.00
      tax_rate: 10
  expected_data:
    orderLineMatches:
      - purchaseOrderIndex: 1
        purchaseOrderLineIndex: 1 # Desktop Computer Dell OptiPlex
        invoiceLineIndex: 1 # Dell OptiPlex Desktop Computer
      - purchaseOrderIndex: 1
        purchaseOrderLineIndex: 2 # Monitor 27 inch 4K
        invoiceLineIndex: 2 # 27" 4K Monitor
      - purchaseOrderIndex: 2
        purchaseOrderLineIndex: 1 # Wireless Mouse Ergonomic
        invoiceLineIndex: 3 # Ergonomic Wireless Mouse
      - purchaseOrderIndex: 2
        purchaseOrderLineIndex: 2 # Webcam HD 1080p
        invoiceLineIndex: 4 # HD 1080p Webcam
      - purchaseOrderIndex: 3
        purchaseOrderLineIndex: 1 # USB Hub 7 Port
        invoiceLineIndex: 5 # USB Hub - 7 Ports

