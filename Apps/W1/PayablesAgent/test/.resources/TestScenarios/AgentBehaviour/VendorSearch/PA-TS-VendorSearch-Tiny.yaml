tests:
  # --- Exact match ---
  - name: SEARCH_VENDOR_01
    description: Exact search using full vendor name and address.
    test_setup: PA-Setup-VendorSearch.yaml
    vendor:
      Name: Atlantics Supply LLC
      Address: 1201 Ocean Drive
      Country/Region Code: US
      City: Miami
      Post Code: 33139
    inboundInvoice:
      Posting Date: 2025-12-04
      Due Date: 2026-01-03
      Document Date: 2025-12-04
      No.: INV-001
      Payment Terms Code: 30 Days
      Shipment Method Code: DELIVERY
    inboundInvoiceLines:
    - Type: 1
      No.: 1234
      Description: Consulting
      Quantity: 1
      Unit Price: 100
    expected:
      data:
        purchaseHeader:
          Vendor Invoice No.: INV-001
          Buy-from Vendor Name: Atlantics Supply LLC
          Buy-from Address: 1201 Ocean Drive
          Buy-from City: Miami
          Buy-from Post Code: 33139
          Buy-from Country/Region Code: US
        purchaseLines:
        - Line No.: 10000
          Type: 1
          No.: 1234
          Description: Consulting
          Quantity: 1
          Unit Cost: 100
