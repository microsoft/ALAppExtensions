tests:
- name: PayablesAgent-VendorCreation-001
  description: Process an invoice PDF for an unknown vendor, where customer asks the agent to create said vendor and continue.
  test_setup: PA-Setup-TINY.yaml
  vendor:
    Name: Prime Insights PLE
    Address: 88 Southview Rd
    Address 2: ''
    Country/Region Code: US
    City: Boston
    Post Code: 02125
  inboundInvoice:
    Posting Date: 2025-05-12
    Due Date: 2025-06-11
    Document Date: 2025-05-12
    No.: INV-001
    Payment Terms Code: 30 Days
    Shipment Method Code: DELIVERY
  inboundInvoiceLines:
  - Type: 1
    No.: GLTEST1234
    Description: Consulting
    Quantity: 10
    Unit Price: 120
  - Type: 1
    No.: GLTEST1234
    Description: Consulting
    Quantity: 4
    Unit Price: 350
  expected:
    user_intervention:
    - reason: The vendor is missing on the draft
      create_vendor: true
    data:
      purchaseHeader:
        Vendor Invoice No.: INV-001
        Buy-from Vendor Name: Prime Insights PLE
      purchaseLines:
      - Line No.: 10000
        Type: 1
        No.: GLTEST1234
        Description: Consulting
        Quantity: 10
        Unit Cost: 120
      - Line No.: 20000
        Type: 1
        No.: GLTEST1234
        Description: Consulting
        Quantity: 4
        Unit Cost: 350
